# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8081

# ─── Database MySQL ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/servfast_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=servfast_super_secret_key_min_256_bits_long_here
jwt.expiration=86400000

# ─── CORS ────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:3001

# ─── Frontend URL (used in reset email links) ─────────────────────────────────
app.frontend-url=http://localhost:3001

# ─── SMTP Email (Gmail example — use App Password if 2FA enabled) ─────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password-here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# ─── Anthropic (AI Assistant) ─────────────────────────────────────────────────
anthropic.api.key=sk-ant-your-key-here

# ─── Stripe (Payment) ─────────────────────────────────────────────────────────
stripe.secret.key=sk_test_your-stripe-key-here

# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB